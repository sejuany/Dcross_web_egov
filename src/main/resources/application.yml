server:
  port: 8081
  forward-headers-strategy: framework

logging:
  level:
    com.dacos: debug

spring:
  profiles:
    include: local # application-local.yml 자동 로드 (Git 제외 파일, DB 접속 정보 포함)

  threads:
    virtual:
      enabled: true # Java 21 가상 스레드 (성능 향상)

  # application-local.yml 에서 실제 DB 값을 덮어씁니다.
  # 팀원들은 각자 application-local.yml 파일을 만들어 DB 정보를 입력하세요.
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/orcl}
    username: ${DB_USERNAME:YOUR_DB_USERNAME}
    password: ${DB_PASSWORD:YOUR_DB_PASSWORD}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: false # DB 컬럼명 그대로 사용 (기존 프론트와 호환)
    default-fetch-size: 100
    default-statement-timeout: 30
    jdbc-type-for-null: VARCHAR # Oracle null 파라미터 타입 오류 방지 (ORA-17004)